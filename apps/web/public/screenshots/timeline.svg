<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">Timeline page screenshot preview</title>
  <desc id="desc">A public demo screenshot showing readable record cards in Timeline.</desc>
  <rect width="390" height="844" fill="#e7e5e4"/>
  <rect x="0" y="0" width="390" height="844" fill="#fafaf9"/>
  <text x="24" y="44" fill="#0f766e" font-family="Arial, sans-serif" font-size="13" font-weight="700">NEARU</text>
  <text x="24" y="82" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">记录</text>
  <circle cx="342" cy="56" r="24" fill="#fef3c7"/>
  <text x="342" y="63" fill="#78350f" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">ot</text>
  <rect x="16" y="122" width="358" height="158" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="32" y="160" fill="#0f172a" font-family="Arial, sans-serif" font-size="21" font-weight="700">完成了一次缓一缓</text>
  <text x="32" y="196" fill="#475569" font-family="Arial, sans-serif" font-size="16">刚刚完成：1 分钟慢慢呼吸。</text>
  <rect x="32" y="216" width="74" height="30" rx="15" fill="#f1f5f9"/>
  <text x="69" y="236" fill="#475569" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">breathe</text>
  <rect x="116" y="216" width="104" height="30" rx="15" fill="#f1f5f9"/>
  <text x="168" y="236" fill="#475569" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">low-pressure</text>
  <rect x="16" y="304" width="358" height="174" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="32" y="342" fill="#0f172a" font-family="Arial, sans-serif" font-size="21" font-weight="700">完成了一次轻活动</text>
  <text x="32" y="378" fill="#475569" font-family="Arial, sans-serif" font-size="16">刚刚完成：2 分钟轻柔肩颈活动。</text>
  <text x="32" y="426" fill="#64748b" font-family="Arial, sans-serif" font-size="13">This is based on your records and is not a medical diagnosis.</text>
  <rect x="16" y="514" width="358" height="112" rx="16" fill="#ecfdf5" stroke="#99f6e4"/>
  <text x="32" y="552" fill="#115e59" font-family="Arial, sans-serif" font-size="19" font-weight="700">低压力记录</text>
  <text x="32" y="586" fill="#134e4a" font-family="Arial, sans-serif" font-size="15">只保存用户主动确认的内容。</text>
  <rect x="0" y="760" width="390" height="84" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="40" y="806" fill="#64748b" font-family="Arial, sans-serif" font-size="15" font-weight="700">说说</text>
  <text x="118" y="806" fill="#64748b" font-family="Arial, sans-serif" font-size="15" font-weight="700">缓一缓</text>
  <text x="203" y="806" fill="#64748b" font-family="Arial, sans-serif" font-size="15" font-weight="700">动一动</text>
  <text x="286" y="806" fill="#0f766e" font-family="Arial, sans-serif" font-size="15" font-weight="700">记录</text>
  <text x="344" y="806" fill="#64748b" font-family="Arial, sans-serif" font-size="15" font-weight="700">我的</text>
</svg>
