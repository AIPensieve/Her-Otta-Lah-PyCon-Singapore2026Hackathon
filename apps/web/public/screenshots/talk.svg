  <rect x="16" y="378" width="358" height="226" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="32" y="418" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700">我听到了。</text>
  <rect x="32" y="442" width="326" height="92" rx="12" fill="#f5f5f4"/>
