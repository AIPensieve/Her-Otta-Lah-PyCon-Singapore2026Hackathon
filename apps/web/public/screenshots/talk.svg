<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">Talk page screenshot preview</title>
  <desc id="desc">A public demo screenshot showing the Talk page and low-pressure AI recommendation.</desc>
  <rect width="390" height="844" fill="#e7e5e4"/>
