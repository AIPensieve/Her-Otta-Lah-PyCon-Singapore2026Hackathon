  <text x="116" y="184" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="15">身体和心情，都可以告诉我。</text>
  <rect x="32" y="210" width="326" height="78" rx="12" fill="#ffffff"/>
  <text x="48" y="254" fill="#64748b" font-family="Arial, sans-serif" font-size="16">我今天 very tired...</text>
